name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.0.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test tooling
        run: python3 -m pip install pytest

      - name: Verify tag matches version files
        run: python3 scripts/check_release_version.py "${RELEASE_TAG#v}"

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Run extension tests
        working-directory: extension
        run: npm test

      - name: Run native tests
        run: python3 -m pytest native/tests -q

      - name: Build Firefox extension
        working-directory: extension
        run: npm run build

      - name: Package Firefox XPI
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd extension/dist
          zip -qr "../../tabarchive-${VERSION}-firefox.xpi" .

      - name: Build Chromium extension
        working-directory: extension
        run: npm run build:chromium

      - name: Package Chromium ZIP
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd extension/dist
          zip -qr "../../tabarchive-${VERSION}-chromium.zip" .

      - name: Generate checksums
        run: |
          VERSION="${RELEASE_TAG#v}"
          sha256sum \
            "tabarchive-${VERSION}-firefox.xpi" \
            "tabarchive-${VERSION}-chromium.zip" \
            > "tabarchive-${VERSION}-checksums.txt"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          RELEASE_NOTE_PREFIX=$'Developer install only.\n\nThese artifacts are unsigned extension builds for manual loading on macOS or\nLinux. Install the native host from this repository before using them.'
          ASSETS=(
            "tabarchive-${VERSION}-firefox.xpi"
            "tabarchive-${VERSION}-chromium.zip"
            "tabarchive-${VERSION}-checksums.txt"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            BODY="$(gh release view "$TAG" --json body --jq .body)"
            if ! printf '%s' "$BODY" | grep -Fq "Developer install only."; then
              printf -v UPDATED_NOTES '%s\n\n%s' "$RELEASE_NOTE_PREFIX" "$BODY"
              gh release edit "$TAG" --notes "$UPDATED_NOTES"
            fi
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "$TAG" \
              --notes "$RELEASE_NOTE_PREFIX" \
              --generate-notes
          fi
